# Local Azure Storage emulator for Functions (timers, queues, blobs).
# Start before `npm start`: npm run storage:start
services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    ports:
      - "10000:10000" # blob
      - "10001:10001" # queue
      - "10002:10002" # table
    command: >
      azurite
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --tableHost 0.0.0.0
      --location /data
    volumes:
      - azurite-data:/data

volumes:
  azurite-data:
