# Local emulators for Functions + Cosmos.
# Start before `npm start`: npm run dev:deps
#
# Cosmos needs ports 8081 AND 10250-10255 (gateway). Missing ports cause crashes on first query.
# Give Docker Desktop ≥ 10 GB RAM (Preferences → Resources) — emulator + SQL is heavy on ~8 GB hosts.
services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    restart: unless-stopped
    ports:
      - "10000:10000" # blob
      - "10001:10001" # queue
      - "10002:10002" # table
    command: >
      azurite
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --tableHost 0.0.0.0
      --location /data
      --skipApiVersionCheck
    volumes:
      - ./.azurite:/data

  cosmos-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "10250-10255:10250-10255"
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: 1
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "false"
      AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: 127.0.0.1
    mem_limit: 3g
    healthcheck:
      test: ["CMD-SHELL", "code=$(curl -sk -o /dev/null -w '%{http_code}' https://localhost:8081/); test \"$code\" = \"200\" -o \"$code\" = \"401\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "PortfolioDev1!"
    mem_limit: 2g
    volumes:
      - ./.mssql:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
