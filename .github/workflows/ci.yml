name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: portfolio-api

      - uses: actions/checkout@v4
        with:
          repository: Dilipmukkapati1/portfolio-contracts
          path: portfolio-contracts

      - uses: actions/checkout@v4
        with:
          repository: Dilipmukkapati1/portfolio-tax-engine
          path: portfolio-tax-engine

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build dependencies
        working-directory: portfolio-api
        run: |
          cd ../portfolio-contracts && npm ci && npm run build
          cd ../portfolio-tax-engine && npm ci && npm run build

      - run: npm ci
        working-directory: portfolio-api

      - run: npm run lint
        working-directory: portfolio-api

      - run: npm test
        working-directory: portfolio-api

      - run: npm run build
        working-directory: portfolio-api
