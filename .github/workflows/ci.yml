name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build dependencies
        run: |
          cd ../portfolio-contracts && npm ci && npm run build
          cd ../portfolio-tax-engine && npm ci && npm run build
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          cd ../portfolio-contracts && npm ci && npm run build
          cd ../portfolio-tax-engine && npm ci && npm run build
          npm ci && npm run build
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Run Liquibase migrations
        if: ${{ secrets.AZURE_SQL_LIQUIBASE_JDBC_URL != '' }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE/db:/liquibase/changelog" \
            -w /liquibase/changelog \
            liquibase/liquibase:4.31 \
            --url="${{ secrets.AZURE_SQL_LIQUIBASE_JDBC_URL }}" \
            --changelog-file=changelog/db.changelog-master.yaml \
            update
      - name: Deploy Function App
        run: |
          cd dist && zip -r ../api.zip .
          az functionapp deployment source config-zip \
            -g rg-portfolio \
            -n ${{ vars.FUNCTION_APP_NAME }} \
            --src ../api.zip
