name: Deploy prod

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-prod]

concurrency:
  group: deploy-prod-api
  cancel-in-progress: true

env:
  API_REF: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.ref || github.ref }}
  LIB_REF: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          path: portfolio-api
          ref: ${{ env.API_REF }}

      - uses: actions/checkout@v4
        with:
          repository: Dilipmukkapati1/portfolio-contracts
          path: portfolio-contracts
          ref: ${{ env.LIB_REF }}

      - uses: actions/checkout@v4
        with:
          repository: Dilipmukkapati1/portfolio-tax-engine
          path: portfolio-tax-engine
          ref: ${{ env.LIB_REF }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build and package API
        working-directory: portfolio-api
        run: |
          cd ../portfolio-contracts && npm ci && npm run build
          cd ../portfolio-tax-engine && npm ci && npm run build
          npm ci && npm run build
          zip -rq api.zip host.json package.json dist node_modules \
            -x "node_modules/azure-functions-core-tools/*" \
            -x "node_modules/azurite/*" \
            -x "node_modules/@types/*" \
            -x "node_modules/typescript/*" \
            -x "node_modules/vitest/*"

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Liquibase migrations
        working-directory: portfolio-api
        env:
          LIQUIBASE_URL: ${{ secrets.AZURE_SQL_LIQUIBASE_JDBC_URL }}
          LIQUIBASE_USERNAME: ${{ secrets.AZURE_SQL_LIQUIBASE_USERNAME }}
          LIQUIBASE_PASSWORD: ${{ secrets.AZURE_SQL_LIQUIBASE_PASSWORD }}
        run: |
          if [ -z "$LIQUIBASE_URL" ]; then
            echo "Skipping Liquibase (AZURE_SQL_LIQUIBASE_JDBC_URL not configured)"
            exit 0
          fi
          if [ -z "$LIQUIBASE_USERNAME" ] || [ -z "$LIQUIBASE_PASSWORD" ]; then
            echo "Skipping Liquibase (username/password secrets not configured)"
            exit 0
          fi
          docker run --rm \
            -v "$GITHUB_WORKSPACE/portfolio-api/db:/liquibase/changelog" \
            -w /liquibase/changelog \
            liquibase/liquibase:4.31 \
            --url="$LIQUIBASE_URL" \
            --username="$LIQUIBASE_USERNAME" \
            --password="$LIQUIBASE_PASSWORD" \
            --changelog-file=changelog/db.changelog-master.yaml \
            update

      - name: Deploy Function App
        working-directory: portfolio-api
        env:
          FUNCTION_APP_NAME: ${{ vars.FUNCTION_APP_NAME }}
        run: |
          app_name="${FUNCTION_APP_NAME:-ppm-prod-func-x32hrp}"
          az functionapp deployment source config-zip \
            -g rg-portfolio \
            -n "$app_name" \
            --src api.zip
